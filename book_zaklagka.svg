<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 100 100">
  <!-- Группа для центрирования и масштабирования -->
  <g transform="translate(0, 5)">
    
    <!-- Основной контур книги (толстый, четкий) -->
    <rect x="20" y="15" width="60" height="70" rx="4" fill="none" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Переплет (левая часть) -->
    <line x1="32" y1="15" x2="32" y2="85" stroke="#ffffff" stroke-width="4"/>
    
    <!-- Закладка (ОЧЕНЬ крупная, занимает всю высоту) -->
    <!-- Форма ленты с треугольным концом -->
    <path d="M60 15 L80 15 L80 75 L60 63 L40 75 Z" fill="#ffffff"/>
    
    <!-- Декоративная точка сверху закладки (как крепление) -->
    <circle cx="60" cy="19" r="3" fill="#ffffff"/>
    
  </g>
</svg>
