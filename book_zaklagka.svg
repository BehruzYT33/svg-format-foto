<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <!-- Красный фон (как на скриншоте) -->

  <!-- Книга (белый контур) -->
  <rect x="30" y="25" width="60" height="50" rx="2" fill="none" stroke="#ffffff" stroke-width="2.5"/>

  <!-- Переплет книги -->
  <line x1="40" y1="25" x2="40" y2="75" stroke="#ffffff" stroke-width="2"/>

  <!-- Страницы (внутри) -->
  <rect x="45" y="30" width="40" height="40" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.7"/>

  <!-- Закладка (увеличенная, яркая) -->
  <path d="M70 25 L85 25 L85 65 L70 55 L55 65 Z" fill="#ffffff" opacity="0.95"/>
  <!-- Треугольный вырез внизу закладки -->
  <path d="M70 65 L65 70 L75 70 Z" fill="#ffffff" opacity="0.95"/>

  <!-- Декоративный элемент сверху закладки -->
  <circle cx="70" cy="27" r="2.5" fill="#ffffff"/>
</svg>
