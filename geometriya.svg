<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Круг (символ геометрии) -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#ebebeb" stroke-width="2"/>
  
  <!-- Циркуль -->
  <line x1="40" y1="20" x2="50" y2="50" stroke="#ebebeb" stroke-width="2"/>
  <line x1="60" y1="20" x2="50" y2="50" stroke="#ebebeb" stroke-width="2"/>
  <circle cx="40" cy="20" r="3" fill="#ebebeb"/>
  <circle cx="60" cy="20" r="3" fill="#ebebeb"/>
  
  <!-- Линейка -->
  <rect x="20" y="70" width="60" height="8" fill="none" stroke="#ebebeb" stroke-width="2"/>
  <line x1="25" y1="70" x2="25" y2="78" stroke="#ebebeb" stroke-width="1"/>
  <line x1="35" y1="70" x2="35" y2="78" stroke="#ebebeb" stroke-width="1"/>
  <line x1="45" y1="70" x2="45" y2="78" stroke="#ebebeb" stroke-width="1"/>
  <line x1="55" y1="70" x2="55" y2="78" stroke="#ebebeb" stroke-width="1"/>
  <line x1="65" y1="70" x2="65" y2="78" stroke="#ebebeb" stroke-width="1"/>
  <line x1="75" y1="70" x2="75" y2="78" stroke="#ebebeb" stroke-width="1"/>
  
  <!-- Формулы -->
  <text x="22" y="95" font-size="10" fill="#ebebeb">π</text>
  <text x="40" y="95" font-size="10" fill="#ebebeb">√</text>
  <text x="55" y="95" font-size="10" fill="#ebebeb">Σ</text>
</svg>
