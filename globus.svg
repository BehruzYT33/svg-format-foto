<svg width="200" height="200" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    Цвет: #E5E7EB (Светло-серый)
    Фон: Прозрачный (нет белого rect)
  -->
  <g stroke="#E5E7EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Подставка (основание) -->
    <path d="M35 85 Q 50 95, 65 85" />
    <line x1="50" y1="85" x2="50" y2="75" />
    
    <!-- Дуга держателя (меридиан) -->
    <path d="M40 75 Q 30 50, 40 25" />
    <path d="M60 75 Q 70 50, 60 25" />
    
    <!-- Шар глобуса -->
    <circle cx="50" cy="50" r="22" />
    
    <!-- Материки (схематичные линии) -->
    <path d="M40 40 Q 45 35, 50 38 T 60 40" />
    <path d="M38 50 Q 45 48, 50 50 T 62 48" />
    <path d="M45 60 Q 50 58, 55 60" />
    
    <!-- Экватор (пунктир) -->
    <path d="M32 50 Q 50 55, 68 50" stroke-dasharray="2 2" opacity="0.6" />
    
  </g>
</svg>