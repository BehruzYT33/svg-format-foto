<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <!-- Внешний круг глобуса -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- Меридианы -->
  <ellipse cx="50" cy="50" rx="22" ry="45" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="35" ry="45" fill="none" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Параллели -->
  <ellipse cx="50" cy="50" rx="45" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5"/>
  <ellipse cx="50" cy="50" rx="45" ry="35" fill="none" stroke="#ffffff" stroke-width="1"/>
  
  <!-- Стилизованные материки -->
  <path d="M40 30c5 2 10 1 12 5s-2 7-6 8c-4 1-7-2-9-5s-2-6 3-8z" fill="#ffffff" opacity="0.7"/>
  <path d="M60 55c4 2 8 4 9 7s-2 6-6 6c-4 0-7-3-8-6s0-5 5-7z" fill="#ffffff" opacity="0.7"/>
  
  <!-- Орнамент вокруг глобуса -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#ffffff" stroke-dasharray="2,4" stroke-width="1"/>
  
  <!-- Основание (подставка глобуса) -->
  <line x1="30" y1="90" x2="70" y2="90" stroke="#ffffff" stroke-width="2"/>
  <line x1="50" y1="95" x2="50" y2="90" stroke="#ffffff" stroke-width="2"/>
</svg>
